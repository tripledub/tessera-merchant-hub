# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  NewCops: enable

# Overwrite or add rules to create your own house style
RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Max: 20

# Policy and request specs legitimately need multiple role users / records
RSpec/MultipleMemoizedHelpers:
  Max: 10

# Struct stubs in policy specs are guarded with unless defined?
RSpec/LeakyConstantDeclaration:
  Enabled: false

# let! is intentional for test data that must exist in the DB before the example runs
RSpec/LetSetup:
  Enabled: false
