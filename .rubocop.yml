# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  NewCops: enable

# Overwrite or add rules to create your own house style
RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Max: 20

# Policy specs need multiple role users — raise the limit
RSpec/MultipleMemoizedHelpers:
  Max: 8

# Struct stubs in policy specs are guarded with unless defined?
RSpec/LeakyConstantDeclaration:
  Enabled: false
