name: UAT Deploy

on:
  push:
    branches: [uat]
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to deploy
        required: false
        default: uat

concurrency:
  group: merchant-hub-uat
  cancel-in-progress: false

jobs:
  ci:
    name: CI gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: merchanthub
          POSTGRES_PASSWORD: password
          POSTGRES_DB: merchanthub_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://merchanthub:password@localhost:5432/merchanthub_test
      RAILS_ENV: test
      TESSERA_CORE_URL: http://localhost:4000
      TESSERA_INTERNAL_API_KEY: test-internal-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Security scan
        run: bin/brakeman --no-pager

      - name: Lint
        run: bin/rubocop -f github

      - name: Check autoload integrity
        run: bundle exec rails zeitwerk:check

      - name: Set up database
        run: bin/rails db:migrate

      - name: Build Tailwind CSS
        run: bin/rails tailwindcss:build

      - name: Run tests
        run: bundle exec rspec

  deploy:
    name: Deploy UAT
    runs-on: ubuntu-latest
    needs: ci
    environment: uat

    env:
      DEPLOY_REF: ${{ github.event.inputs.deploy_ref || github.ref_name }}
      UAT_DOMAIN: ${{ vars.UAT_DOMAIN }}
      CERTBOT_EMAIL: ${{ vars.CERTBOT_EMAIL }}
      MERCHANT_HUB_REPO_URL: ${{ vars.MERCHANT_HUB_REPO_URL }}

    steps:
      - name: Checkout infra
        uses: actions/checkout@v7
        with:
          repository: tripledub/tessera-infra
          ref: main
          path: tessera-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Configure SSH
        env:
          UAT_SSH_HOST: ${{ secrets.UAT_SSH_HOST }}
          UAT_SSH_PRIVATE_KEY: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$UAT_SSH_PRIVATE_KEY" > ~/.ssh/uat
          chmod 600 ~/.ssh/uat
          ssh-keyscan -H "$UAT_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Write Ansible inventory and vault
        working-directory: tessera-infra/environments/uat/ansible
        env:
          UAT_SSH_HOST: ${{ secrets.UAT_SSH_HOST }}
          UAT_SSH_USER: ${{ secrets.UAT_SSH_USER }}
          UAT_ANSIBLE_VAULT_YML: ${{ secrets.UAT_ANSIBLE_VAULT_YML }}
          UAT_ANSIBLE_VAULT_PASSWORD: ${{ secrets.UAT_ANSIBLE_VAULT_PASSWORD }}
        run: |
          printf '[merchant_hub_uat]\n%s ansible_user=%s ansible_ssh_private_key_file=~/.ssh/uat\n' \
            "$UAT_SSH_HOST" "$UAT_SSH_USER" > inventory.ini
          printf '%s\n' "$UAT_ANSIBLE_VAULT_YML" > vault.yml
          printf '%s\n' "$UAT_ANSIBLE_VAULT_PASSWORD" > /tmp/uat-vault-pass

      - name: Deploy MerchantHub app
        working-directory: tessera-infra
        env:
          ANSIBLE_VAULT_PASSWORD_FILE: /tmp/uat-vault-pass
        run: make -C environments/uat deploy-app
