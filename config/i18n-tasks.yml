## i18n-tasks configuration
# https://github.com/glebm/i18n-tasks

# Keys that are used dynamically at runtime and cannot be statically detected.
ignore_unused:
  # Devise resolves this via User#inactive_message returning :deactivated
  - devise.failure.deactivated
  # Rails form builder resolves these at runtime
  - helpers.submit.applicant_user.*
